<ion-header>
  <ion-toolbar>
    <ion-title>Galería</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- ESTADO VACÍO -->
  <div class="empty-state" *ngIf="photoService.photos.length === 0">
    <ion-icon name="images-outline" class="empty-icon"></ion-icon>
    <h2>No hay fotos</h2>
    <p>Toca el ícono de cámara para capturar tu primera foto</p>
  </div>

  <!-- GALERÍA -->
  <ion-grid *ngIf="photoService.photos.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let photo of photoService.photos; let i = index">
        <div class="photo-container">
          <ion-img 
            [src]="photo.webviewPath" 
            (click)="openFullscreen(photo)"
            class="gallery-image">
          </ion-img>
          <ion-button 
            fill="clear" 
            class="delete-button"
            (click)="showActionSheet(photo, i)">
            <ion-icon name="trash" color="danger"></ion-icon>
          </ion-button>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- MODAL FULLSCREEN -->
  <div class="fullscreen-overlay" *ngIf="selectedPhoto" (click)="closeFullscreen()">
    <ion-button fill="clear" class="close-button" (click)="closeFullscreen()">
      <ion-icon name="close" color="light" size="large"></ion-icon>
    </ion-button>
    <img [src]="selectedPhoto.webviewPath" class="fullscreen-image">
  </div>

</ion-content>
